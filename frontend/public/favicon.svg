<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#111827"/>
  <!-- Grid lines -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#1F2937" stroke-width="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#1F2937" stroke-width="0.5"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#1F2937" stroke-width="0.5"/>
  <!-- Red candles -->
  <rect x="7" y="14" width="2.5" height="6" fill="#EF4444"/>
  <line x1="8.25" y1="12" x2="8.25" y2="14" stroke="#EF4444" stroke-width="1"/>
  <line x1="8.25" y1="20" x2="8.25" y2="22" stroke="#EF4444" stroke-width="1"/>
  <rect x="13" y="13" width="2.5" height="5" fill="#EF4444"/>
  <line x1="14.25" y1="11" x2="14.25" y2="13" stroke="#EF4444" stroke-width="1"/>
  <line x1="14.25" y1="18" x2="14.25" y2="20" stroke="#EF4444" stroke-width="1"/>
  <!-- Green candles -->
  <rect x="10" y="16" width="2.5" height="5" fill="#10B981"/>
  <line x1="11.25" y1="13" x2="11.25" y2="16" stroke="#10B981" stroke-width="1"/>
  <line x1="11.25" y1="21" x2="11.25" y2="23" stroke="#10B981" stroke-width="1"/>
  <rect x="16" y="12" width="2.5" height="4" fill="#10B981"/>
  <line x1="17.25" y1="10" x2="17.25" y2="12" stroke="#10B981" stroke-width="1"/>
  <line x1="17.25" y1="16" x2="17.25" y2="18" stroke="#10B981" stroke-width="1"/>
  <!-- Trending line (teal/green) -->
  <polyline points="6,22 10,19 14,17 18,14 22,10 26,7" stroke="#00E5CC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dots on line -->
  <circle cx="6" cy="22" r="1" fill="#3B82F6"/>
  <circle cx="14" cy="17" r="1" fill="#3B82F6"/>
  <circle cx="22" cy="10" r="1" fill="#3B82F6"/>
  <!-- Arrowhead -->
  <polygon points="26,4 29,9 23,9" fill="#10B981"/>
</svg>